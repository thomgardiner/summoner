name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-deny@0.20.2
          fallback: none
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo deny check advisories

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: nextest@0.9.140
          fallback: none
      - run: >
          cargo nextest run --locked --no-tests fail --bins
          --test setup_onboard --test setup_doctor --test setup_gates
          --test init_atomic

  fleet:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: nextest@0.9.140
          fallback: none
      - name: Install exact Grove 0.4.0 artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GROVE_RELEASE: https://github.com/thomgardiner/grove/releases/download/v0.4.0
        run: |
          set -euo pipefail
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64) target=x86_64-unknown-linux-musl ;;
            Darwin-arm64) target=aarch64-apple-darwin ;;
            Darwin-x86_64) target=x86_64-apple-darwin ;;
            *) echo "unsupported runner: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac
          archive="grove-${target}.tar.xz"
          curl --proto '=https' --tlsv1.2 -fLsS -O "${GROVE_RELEASE}/${archive}"
          curl --proto '=https' --tlsv1.2 -fLsS -O "${GROVE_RELEASE}/${archive}.sha256"
          shasum -a 256 -c "${archive}.sha256"
          mkdir -p "${RUNNER_TEMP}/grove/bin"
          tar -xJf "${archive}" -C "${RUNNER_TEMP}/grove/bin" --strip-components 1
          echo "${RUNNER_TEMP}/grove/bin" >> "${GITHUB_PATH}"
          echo "SUMMONER_TEST_GROVE=${RUNNER_TEMP}/grove/bin/grove" >> "${GITHUB_ENV}"
      - name: Install exact Grove 0.4.0 artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $release = "https://github.com/thomgardiner/grove/releases/download/v0.4.0"
          $archive = "grove-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest "$release/$archive" -OutFile $archive
          Invoke-WebRequest "$release/$archive.sha256" -OutFile "$archive.sha256"
          $expected = (Get-Content "$archive.sha256").Split()[0].ToLowerInvariant()
          $actual = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "Grove archive checksum mismatch" }
          $bin = Join-Path $env:RUNNER_TEMP "grove/bin"
          Expand-Archive $archive -DestinationPath $bin
          $exe = Get-ChildItem $bin -Recurse -File -Filter grove.exe | Select-Object -First 1
          if ($null -eq $exe) { throw "grove.exe missing from archive" }
          $exe.DirectoryName | Out-File $env:GITHUB_PATH -Append
          "SUMMONER_TEST_GROVE=$($exe.FullName)" | Out-File $env:GITHUB_ENV -Append
      - name: Prove exact Grove version and capabilities (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          test "$("$SUMMONER_TEST_GROVE" --version)" = "grove 0.4.0"
          "$SUMMONER_TEST_GROVE" capabilities > grove-capabilities.json
          node -e '
            const c = require("./grove-capabilities.json");
            if (
              c.schema_version !== 1 || c.grove_version !== "0.4.0" ||
              c.status.repository_schema !== 1 || c.status.task_status_schema !== 4 || c.status.task_record_schema !== 6 ||
              !c.task.exec_capabilities.includes("edit") || c.task.verification_policy_pinned !== true ||
              c.inspection.binding_schema !== 1 || c.inspection.execution_schema !== 1 ||
              c.inspection.finish_source_cas !== true ||
              c.inspection.process_tree !== "unix_process_group_best_effort" ||
              c.inspection.filesystem !== "read_only_permissions_and_digest" ||
              c.inspection.output !== "captured_logs_json_report"
            ) process.exit(1);
          '
      - name: Prove exact Grove version and capabilities (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = & $env:SUMMONER_TEST_GROVE --version
          if ($version -ne "grove 0.4.0") { throw "unexpected Grove version: $version" }
          $c = & $env:SUMMONER_TEST_GROVE capabilities | ConvertFrom-Json
          if (
            $c.schema_version -ne 1 -or $c.grove_version -ne '0.4.0' -or
            $c.status.repository_schema -ne 1 -or $c.status.task_status_schema -ne 4 -or $c.status.task_record_schema -ne 6 -or
            -not ($c.task.exec_capabilities -contains 'edit') -or $c.task.verification_policy_pinned -ne $true -or
            $c.inspection.binding_schema -ne 1 -or $c.inspection.execution_schema -ne 1 -or
            $c.inspection.finish_source_cas -ne $true -or
            $c.inspection.process_tree -ne 'windows_job_object' -or
            $c.inspection.filesystem -ne 'read_only_permissions_and_digest' -or
            $c.inspection.output -ne 'captured_logs_json_report'
          ) { throw "unexpected Grove capabilities: $($c | ConvertTo-Json -Compress -Depth 4)" }
      - name: Run portable full lifecycle
        run: cargo nextest run --locked --no-tests fail --test fleet_lifecycle
      - name: Run fresh-repository onboarding
        run: cargo nextest run --locked --no-tests fail --test onboarding
      - name: Run atomic onboarding
        run: cargo nextest run --locked --no-tests fail --test init_atomic
      - name: Run complete Unix fleet suite
        if: runner.os != 'Windows'
        # fleet.rs was split into themed crates; fleet_lifecycle already ran above.
        run: >
          cargo nextest run --locked --no-tests fail
          --test fleet_deps --test fleet_failures --test fleet_limits
          --test fleet_plan --test fleet_recovery --test fleet_resume
          --test fleet_review --test fleet_signals --test fleet_verify

  distribution:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install dist 0.32.0
        shell: bash
        run: |
          set -euo pipefail
          installer="${RUNNER_TEMP}/cargo-dist-installer.sh"
          curl --proto '=https' --tlsv1.2 -fLsS \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh \
            -o "${installer}"
          echo "b657cf8c04a8b7bc28f39d220f7e6dd11bbd2bdb072c552262bd9ccf597261b5  ${installer}" | shasum -a 256 -c -
          sh "${installer}"
      - name: Check generated release workflow and qualification gate
        run: |
          node .github/workflows/patch-release-condition.mjs --test-permissions
          node .github/workflows/patch-release-condition.mjs --test-qualification
          node .github/workflows/patch-release-condition.mjs
          dist plan
          git diff --exit-code -- dist-workspace.toml .github/workflows/release.yml

  source-install:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install from the source tree
        run: cargo install --path . --locked --root "${{ runner.temp }}/summoner-install"
      - name: Smoke installed binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: 'test "$("${{ runner.temp }}/summoner-install/bin/summoner" --version)" = "summoner 0.2.0"'
      - name: Smoke installed binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = & "${{ runner.temp }}/summoner-install/bin/summoner.exe" --version
          if ($version -ne "summoner 0.2.0") { throw "unexpected version: $version" }
