name: ci

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-deny@0.20.2
          fallback: none
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo deny check advisories

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: nextest@0.9.140
          fallback: none
      - run: cargo nextest run --locked --no-tests fail --bins --test setup --test init_atomic

  fleet:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: nextest@0.9.140
          fallback: none
      # Grove has no published release yet; install from source at the exact
      # commit the compatibility contract targets. Restore the checksum-verified
      # artifact install with the first Grove GitHub release.
      - name: Install Grove at the pinned commit (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cargo install --git https://github.com/thomgardiner/grove \
            --rev b5ca0388b749ae1afb6df6b6ccb21821e7ae1f52 --locked \
            --root "${RUNNER_TEMP}/grove"
          echo "${RUNNER_TEMP}/grove/bin" >> "${GITHUB_PATH}"
          echo "SUMMONER_TEST_GROVE=${RUNNER_TEMP}/grove/bin/grove" >> "${GITHUB_ENV}"
      - name: Install Grove at the pinned commit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo install --git https://github.com/thomgardiner/grove `
            --rev b5ca0388b749ae1afb6df6b6ccb21821e7ae1f52 --locked `
            --root (Join-Path $env:RUNNER_TEMP "grove")
          $bin = Join-Path $env:RUNNER_TEMP "grove/bin"
          $bin | Out-File $env:GITHUB_PATH -Append
          "SUMMONER_TEST_GROVE=$(Join-Path $bin 'grove.exe')" | Out-File $env:GITHUB_ENV -Append
      - name: Prove exact Grove version and capabilities (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          test "$("$SUMMONER_TEST_GROVE" --version)" = "grove 0.3.4"
          "$SUMMONER_TEST_GROVE" capabilities > grove-capabilities.json
          node -e '
            const c = require("./grove-capabilities.json");
            if (
              c.schema_version !== 1 || c.grove_version !== "0.3.4" ||
              c.status.repository_schema !== 1 || c.status.task_status_schema !== 3 || c.status.task_record_schema !== 5 ||
              c.inspection.binding_schema !== 1 || c.inspection.execution_schema !== 1 ||
              c.inspection.finish_source_cas !== true ||
              c.inspection.process_tree !== "unix_process_group_best_effort" ||
              c.inspection.filesystem !== "read_only_permissions_and_digest" ||
              c.inspection.output !== "captured_logs_json_report"
            ) process.exit(1);
          '
      - name: Prove exact Grove version and capabilities (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = & $env:SUMMONER_TEST_GROVE --version
          if ($version -ne "grove 0.3.4") { throw "unexpected Grove version: $version" }
          $c = & $env:SUMMONER_TEST_GROVE capabilities | ConvertFrom-Json
          if (
            $c.schema_version -ne 1 -or $c.grove_version -ne '0.3.4' -or
            $c.status.repository_schema -ne 1 -or $c.status.task_status_schema -ne 3 -or $c.status.task_record_schema -ne 5 -or
            $c.inspection.binding_schema -ne 1 -or $c.inspection.execution_schema -ne 1 -or
            $c.inspection.finish_source_cas -ne $true -or
            $c.inspection.process_tree -ne 'windows_job_object' -or
            $c.inspection.filesystem -ne 'read_only_permissions_and_digest' -or
            $c.inspection.output -ne 'captured_logs_json_report'
          ) { throw "unexpected Grove capabilities: $($c | ConvertTo-Json -Compress -Depth 4)" }
      - name: Run portable full lifecycle
        run: cargo nextest run --locked --no-tests fail --test fleet_lifecycle
      - name: Run fresh-repository onboarding
        run: cargo nextest run --locked --no-tests fail --test onboarding
      - name: Run atomic onboarding
        run: cargo nextest run --locked --no-tests fail --test init_atomic
      - name: Run complete Unix fleet suite
        if: runner.os != 'Windows'
        run: cargo nextest run --locked --no-tests fail --test fleet

  distribution:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install dist 0.32.0
        shell: bash
        run: |
          set -euo pipefail
          installer="${RUNNER_TEMP}/cargo-dist-installer.sh"
          curl --proto '=https' --tlsv1.2 -fLsS \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh \
            -o "${installer}"
          echo "b657cf8c04a8b7bc28f39d220f7e6dd11bbd2bdb072c552262bd9ccf597261b5  ${installer}" | shasum -a 256 -c -
          sh "${installer}"
      - name: Check generated release workflow and qualification gate
        run: |
          node .github/workflows/patch-release-condition.mjs --test-permissions
          node .github/workflows/patch-release-condition.mjs --test-qualification
          node .github/workflows/patch-release-condition.mjs
          dist plan
          git diff --exit-code -- dist-workspace.toml .github/workflows/release.yml

  source-install:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install from the source tree
        run: cargo install --path . --locked --root "${{ runner.temp }}/summoner-install"
      - name: Smoke installed binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: 'test "$("${{ runner.temp }}/summoner-install/bin/summoner" --version)" = "summoner 0.1.0"'
      - name: Smoke installed binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = & "${{ runner.temp }}/summoner-install/bin/summoner.exe" --version
          if ($version -ne "summoner 0.1.0") { throw "unexpected version: $version" }
